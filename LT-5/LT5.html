<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Analysis Tool</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 40px;
    }

    .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
    }

    textarea {
        width: 100%;
        height: 150px;
        padding: 10px;
        font-size: 16px;
        border-radius: 5px;
        border: 1px solid #ccc;
        resize: none;
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        background: #f9f9f9;
        border-left: 5px solid #007bff;
        border-radius: 5px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Text Analysis Tool</h2>

    <textarea id="inputText" placeholder="Paste your text here..."></textarea>

    <button onclick="analyzeText()">Analyze Text</button>

    <div id="result" class="result"></div>
</div>

<script>
function analyzeText() {
    let text = document.getElementById("inputText").value;

    let resultDiv = document.getElementById("result");

    // Handle empty input
    if (text.trim() === "") {
        resultDiv.innerHTML = "<p>Please enter some text.</p>";
        return;
    }

    // Character count 
    let charCount = text.length;

    // Word count 
    let words = text.trim().split(/\s+/);
    let wordCount = words.length;

    // Reverse text
    let reversedText = text.split("").reverse().join("");

    // Display results
    resultDiv.innerHTML = `
        <p><strong>Total Characters:</strong> ${charCount}</p>
        <p><strong>Total Words:</strong> ${wordCount}</p>
        <p><strong>Reversed Text:</strong></p>
        <p>${reversedText}</p>
    `;
}
</script>

</body>
</html>
